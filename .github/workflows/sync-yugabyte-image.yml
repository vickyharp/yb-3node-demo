name: Sync YugabyteDB image to GHCR

# Mirror yugabytedb/yugabyte:latest to ghcr.io so Codespaces pull from Azure-co-located GHCR
# instead of Docker Hub. Uses imagetools (no full image download on the runner).
on:
  workflow_dispatch:
  schedule:
    # Weekly refresh — avoids burning Actions minutes on every push to main
    - cron: "0 6 * * 0"

permissions:
  contents: read
  packages: write

env:
  SOURCE_IMAGE: docker.io/yugabytedb/yugabyte:latest
  TARGET_IMAGE: ghcr.io/${{ github.repository }}:latest

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Mirror image to GHCR
        run: |
          docker buildx imagetools create -t "$TARGET_IMAGE" "$SOURCE_IMAGE"

      - name: Remind about one-time visibility setup
        run: |
          echo "::notice::Image pushed to GHCR. If this is the first sync, make the package public once:"
          echo "::notice::https://github.com/users/vickyharp/packages/container/yb-3node-demo/settings"
          echo "::notice::Package settings → Change visibility → Public"
