name: Sync YugabyteDB image to GHCR

# Mirror yugabytedb/yugabyte:latest to ghcr.io so Codespaces pull from Azure-co-located GHCR
# instead of Docker Hub. Uses imagetools (no full image download on the runner).
on:
  workflow_dispatch:
  schedule:
    # Weekly refresh — avoids burning Actions minutes on every push to main
    - cron: "0 6 * * 0"

permissions:
  contents: read
  packages: write

env:
  SOURCE_IMAGE: docker.io/yugabytedb/yugabyte:latest
  TARGET_IMAGE: ghcr.io/${{ github.repository }}:latest

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Mirror image to GHCR
        run: |
          docker buildx imagetools create -t "$TARGET_IMAGE" "$SOURCE_IMAGE"

      - name: Link package to repository
        run: |
          gh api --method PUT \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/users/${{ github.repository_owner }}/packages/container/${{ github.event.repository.name }}/repositories/${{ github.event.repository.id }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Make package public
        run: |
          # /user/packages/... 404s under GITHUB_TOKEN; use /users/{owner}/packages/...
          for attempt in 1 2 3 4 5; do
            if gh api --method PATCH \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/users/${{ github.repository_owner }}/packages/container/${{ github.event.repository.name }}" \
              -f visibility='public'; then
              exit 0
            fi
            echo "Package not visible to API yet (attempt ${attempt}/5), retrying in 10s..."
            sleep 10
          done
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
